<div class="auth-container">
  <div class="auth-box">
    <h1>🎬 Mes Films</h1>
    <h2>Inscription</h2>

    @if (erreur) {
      <p class="erreur">{{ erreur }}</p>
    }

    @if (succes) {
      <p class="succes">{{ succes }}</p>
    }

    <input
      type="text"
      [(ngModel)]="nom"
      placeholder="Nom"
    />

    <input
      type="email"
      [(ngModel)]="email"
      placeholder="Email"
    />

    <input
      type="password"
      [(ngModel)]="password"
      placeholder="Mot de passe"
    />

    <button (click)="register()">S'inscrire</button>

    <p class="lien">Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>
