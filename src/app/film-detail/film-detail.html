@if (film) {
  <div class="detail">
    <button (click)="retour()">⬅️ Retour</button>
    <img
      [src]="'https://mesfilms-backend.onrender.com/images/' + film.asset.toLowerCase() + '.jpg'"
      alt="{{ film.titre }}"
    />
    <h2>{{ film.titre }}</h2>
    <p>📦 Boite : {{ film.boite }}</p>
    <p>🏷️ Asset : {{ film.asset }}</p>
    <p>🔢 UPC : {{ film.upc }}</p>
  </div>
} @else {
  <p>Chargement...</p>
}
